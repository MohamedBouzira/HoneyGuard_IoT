<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHome Hub — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0a0e17;
            --surface:   #111827;
            --border:    #1e2d40;
            --accent:    #00d4aa;
            --accent2:   #0ea5e9;
            --text:      #e2e8f0;
            --muted:     #64748b;
            --error:     #f87171;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* animated background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridMove {
            0%   { transform: translateY(0); }
            100% { transform: translateY(40px); }
        }

        /* glow blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
            animation: blobFloat 8s ease-in-out infinite;
        }
        .blob-1 {
            width: 400px; height: 400px;
            background: var(--accent);
            top: -100px; left: -100px;
        }
        .blob-2 {
            width: 300px; height: 300px;
            background: var(--accent2);
            bottom: -80px; right: -80px;
            animation-delay: -4s;
        }
        @keyframes blobFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50%       { transform: translate(20px, 20px) scale(1.05); }
        }

        .card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 0 60px rgba(0,212,170,0.05), 0 24px 48px rgba(0,0,0,0.4);
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 44px; height: 44px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 0 20px rgba(0,212,170,0.3);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .logo-tagline {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-family: 'DM Mono', monospace;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
            font-family: 'DM Mono', monospace;
        }

        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,212,170,0.1);
        }

        input::placeholder { color: var(--muted); }

        .error-msg {
            background: rgba(248,113,113,0.1);
            border: 1px solid rgba(248,113,113,0.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--error);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            color: #0a0e17;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
            margin-top: 8px;
            box-shadow: 0 0 20px rgba(0,212,170,0.2);
        }

        .btn:hover {
            opacity: 0.9;
            box-shadow: 0 0 30px rgba(0,212,170,0.35);
        }

        .btn:active { transform: scale(0.98); }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 28px 0;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
        }

        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.4; }
        }

        .version {
            margin-left: auto;
            font-size: 11px;
            color: var(--border);
        }
    </style>
</head>
<body>
	<!--username: homeowner, password: SmartHome2024 -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="card">
        <div class="logo">
            <div class="logo-icon">🏠</div>
            <div class="logo-text">
                <span class="logo-name">SmartHome Hub</span>
                <span class="logo-tagline">Home Automation System</span>
            </div>
        </div>

        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to control your home</p>

        {% if error %}
        <div class="error-msg">
            <span>⚠</span> {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn">Sign In →</button>
        </form>

        <div class="divider"></div>

        <div class="status-bar">
            <div class="status-dot"></div>
            <span>System online — 8 devices connected</span>
            <span class="version">v2.4.1</span>
        </div>
    </div>
</body>
</html>
