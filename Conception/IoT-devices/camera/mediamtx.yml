# ================================================================
#  MEDIAMTX CONFIG — sim-camera
#  RTSP server, no authentication required
# ================================================================

rtspAddress: :8554
rtmpAddress: :1935
hlsAddress: :8888
webrtcAddress: :8889
srtAddress: :8890

logLevel: info

# internal auth with no users = anyone can publish and read
authMethod: internal
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
      - action: read

paths:
  live:
    source: publisher