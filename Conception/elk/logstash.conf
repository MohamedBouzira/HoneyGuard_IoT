#  LOGSTASH PIPELINE — logstash.conf
#  PFE 2025 — Mohamed Bouzira & Bakhti Rayane Abderaouef
# ================================================================

filter {

  # ── COWRIE ────────────────────────────────────────────────────
  if "cowrie" in [tags] {

    # Drop low-value events before doing anything else
    if [eventid] not in [
        "cowrie.session.connect",
        "cowrie.login.success",
        "cowrie.login.failed",
        "cowrie.command.input",
        "cowrie.session.file_download",
        "cowrie.session.closed"
    ] {
      drop { }
    }

    # Parse cowrie timestamp into @timestamp
    date {
      match    => [ "timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSSSSZ", "yyyy-MM-dd'T'HH:mm:ss.SSSSSS'Z'" ]
      target   => "@timestamp"
      timezone => "UTC"
    }

    # Map eventid → is_attack + attack_type
    ruby {
      code => "
        eventid = event.get('eventid') || ''
        case eventid
        when 'cowrie.login.failed'
          event.set('is_attack', true)
          event.set('attack_type', 'brute_force')
        when 'cowrie.login.success'
          event.set('is_attack', true)
          event.set('attack_type', 'exploit')
        when 'cowrie.session.file_download'
          event.set('is_attack', true)
          event.set('attack_type', 'malware_download')
        when 'cowrie.command.input'
          event.set('is_attack', true)
          event.set('attack_type', 'post_exploit')
        when 'cowrie.session.connect', 'cowrie.session.closed'
          event.set('is_attack', true)
          event.set('attack_type', 'scan')
        else
          event.set('is_attack', false)
          event.set('attack_type', 'benign')
        end
      "
    }

    # Save command (input field) BEFORE mutate wipes everything
    # Only cowrie.command.input events have this field
    ruby {
      code => "
        input_val = event.get('input')
        if input_val.is_a?(String)
          event.set('command', input_val)
        else
          event.set('command', nil)
        end
        event.remove('input')
      "
    }

    # Fix protocol — cowrie writes 'ssh' or 'telnet', we force TCP
    # Remove it first to avoid array conflict, then re-add as single value
    mutate {
      remove_field => [ "protocol" ]
    }

    mutate {
      rename => { "session"  => "session_id" }
      rename => { "url"      => "file_url" }
      rename => { "duration" => "session_duration_s" }

      add_field => {
        "log_type"        => "cowrie"
        "log_source"      => "cowrie"
        "dst_ip"          => "172.20.0.2"
        "protocol"        => "TCP"
        "bytes_sent"      => "0"
        "bytes_received"  => "0"
        "is_internal"     => "false"
        "is_known_device" => "false"
      }

      remove_field => [
        "timestamp", "message", "sensor", "uuid",
        "agent", "ecs", "host", "log", "input",
        "tags", "event"
      ]

      # Fix type mismatches — ES expects integer/float/boolean not strings
      convert => {
        "dst_port"           => "integer"
        "src_port"           => "integer"
        "bytes_sent"         => "integer"
        "bytes_received"     => "integer"
        "session_duration_s" => "float"
        "is_internal"        => "boolean"
        "is_known_device"    => "boolean"
      }
    }

  }

  # ── MQTT ──────────────────────────────────────────────────────
  else if "mqtt" in [tags] {
    mutate {
      add_field    => { "log_source" => "mosquitto" }
      remove_field => [ "message", "agent", "ecs", "host", "log", "event" ]
    }
  }

  # ── HTTP ──────────────────────────────────────────────────────
  else if "http" in [tags] {
    mutate {
      add_field    => { "log_source" => "http_server" }
      remove_field => [ "message", "agent", "ecs", "host", "log", "event" ]
    }
  }

  # ── CoAP ──────────────────────────────────────────────────────
  else if "coap" in [tags] {
    mutate {
      add_field    => { "log_source" => "coap_server" }
      remove_field => [ "message", "agent", "ecs", "host", "log", "event" ]
    }
  }

  # ── NETWORK ───────────────────────────────────────────────────
  else if "network" in [tags] {
    mutate {
      add_field    => { "log_source" => "network" }
      remove_field => [ "message", "agent", "ecs", "host", "log", "event" ]
    }
  }

  # ── IOT PLATFORM ──────────────────────────────────────────────
  else if "iot_platform" in [tags] {
    mutate {
      add_field    => { "log_source" => "iot_platform" }
      remove_field => [ "message", "agent", "ecs", "host", "log", "event" ]
    }
  }

  # ── Parse @timestamp for all non-cowrie events ─────────────────
  if "cowrie" not in [tags] {
    date {
      match => [ "@timestamp", "ISO8601" ]
    }
  }

}

# ----------------------------------------------------------------
# OUTPUT
# ----------------------------------------------------------------
output {

  if [log_source] == "cowrie" {
    elasticsearch {
      hosts => ["localhost:9200"]
      index => "honeypot-cowrie-%{+YYYY.MM.dd}"
    }
  }
  else if [log_source] == "mosquitto" {
    elasticsearch {
      hosts => ["localhost:9200"]
      index => "honeypot-mqtt-%{+YYYY.MM.dd}"
    }
  }
  else if [log_source] == "http_server" {
    elasticsearch {
      hosts => ["localhost:9200"]
      index => "honeypot-http-%{+YYYY.MM.dd}"
    }
  }
  else if [log_source] == "coap_server" {
    elasticsearch {
      hosts => ["localhost:9200"]
      index => "honeypot-coap-%{+YYYY.MM.dd}"
    }
  }
  else if [log_source] == "network" {
    elasticsearch {
      hosts => ["localhost:9200"]
      index => "honeypot-network-%{+YYYY.MM.dd}"
    }
  }
  else if [log_source] == "iot_platform" {
    elasticsearch {
      hosts => ["localhost:9200"]
      index => "honeypot-platform-%{+YYYY.MM.dd}"
    }
  }

  # Uncomment for debugging:
  # stdout { codec => rubydebug }
}